<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Certifications | Eden Adlao</title>
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />



</head>

<body class="main-bg text-white min-h-screen pb-24 md:pb-0 overflow-x-hidden">
    
    <!-- NAVBAR -->
    <nav class="w-full">

        <div class="max-w-7xl mx-auto px-6 md:px-12 py-5 flex items-center justify-between">

            <!-- LOGO -->
            <h1 class="hidden md:block text-lg font-semibold tracking-[6px] text-[#d6b5d4] drop-shadow-[0_0_10px_rgba(243,204,189,0.4)]">
                EDEN ADLAO
            </h1>

            <!-- DESKTOP LINKS -->
            <div class="hidden md:flex items-center gap-10">

                <a href="index.html"
                class="text-white/70 hover:text-[#fdbfb5]
                        hover:drop-shadow-[0_0_10px_rgba(253,191,181,0.9)]
                        transition-all duration-300">
                    HOME
                </a>

                <a href="about.html"
                class="text-white/70 hover:text-[#edabc9]
                        hover:drop-shadow-[0_0_10px_rgba(237,171,201,0.9)]
                        transition-all duration-300">
                    ABOUT
                </a>

                <a href="stack.html"
                class="text-white/70 hover:text-[#d6b5d4]
                        hover:drop-shadow-[0_0_10px_rgba(214,181,212,0.9)]
                        transition-all duration-300">
                    STACK
                </a>

                <!-- ACTIVE PAGE -->
                <a href="certifications.html"
                class="text-[#9ec9ec]
                        drop-shadow-[0_0_10px_rgba(158,201,236,0.9)]">
                    CERTIFICATIONS
                </a>

            </div>

        </div>

        <div class="hidden md:block h-[3px] w-full bg-gradient-to-r from-[#fdbfb5] via-[#edabc9] via-[#d6b5d4] to-[#9ec9ec]"></div>


    </nav>


    <!-- MOBILE BOTTOM NAV -->
    <div class="fixed bottom-0 left-0 w-full md:hidden g-[#0b1027]/90 backdrop-blur-lg border-t border-white/10 flex flex-col z-50">

        <!-- MOBILE GRADIENT LINE (TOP OF NAV) -->
        <div class="h-[3px] w-full bg-gradient-to-r from-[#fdbfb5] via-[#edabc9] via-[#d6b5d4] to-[#9ec9ec]"></div>

    <!-- ICONS -->
        <div class="flex justify-around items-center py-3">

            <a href="index.html"
               class="text-white/70
                      hover:text-[#fdbfb5]
                      hover:drop-shadow-[0_0_10px_rgba(253,191,181,0.9)]
                      transition-all duration-300">

                <span class="material-symbols-outlined text-2xl">
                    home
                </span>

            </a>

            <a href="about.html"
               class="text-white/70
                      hover:text-[#edabc9]
                      hover:drop-shadow-[0_0_10px_rgba(237,171,201,0.9)]
                      transition-all duration-300">

                <span class="material-symbols-outlined text-2xl">
                    person_3
                </span>

            </a>

            <a href="stack.html"
               class="text-white/70
                      hover:text-[#d6b5d4]
                      hover:drop-shadow-[0_0_10px_rgba(214,181,212,0.9)]
                      transition-all duration-300">

                <span class="material-symbols-outlined text-2xl">
                    code_blocks
                </span>

            </a>

            <!-- ACTIVE PAGE -->
            <a href="certifications.html"
               class="text-[#9ec9ec]
                      drop-shadow-[0_0_10px_rgba(158,201,236,0.9)]">

                <span class="material-symbols-outlined text-2xl">
                    workspace_premium
                </span>

            </a>

        </div>

<!-- ========================= -->
<!-- PAGE -->
<!-- ========================= -->
<section class="max-w-5xl mx-auto px-6 pt-14 md:pt-20 pb-24">

    <!-- TITLE -->
    

        <h1 class="text-center text-4xl sm:text-5xl md:text-6xl font-semibold tracking-[5px]
                   text-[#9ec9ec] drop-shadow-[0_0_12px_rgba(158,201,236,1)] mb-16">

            CERTIFICATIONS

        </h1>

    

    <!-- CARDS -->
    <div class="grid
            grid-cols-1
            sm:grid-cols-2
            xl:grid-cols-3
            gap-10
            xl:gap-16
            place-items-center">

        <!-- WORD -->
        <div class="cert-card
                w-full
                sm:w-[250px]
                lg:w-[270px]
                xl:w-[290px]
                rounded-[28px]
                bg-white/5
                backdrop-blur-xl
                p-6
                flex flex-col items-center">

            <!-- IMAGE -->
            <div class="cert-img-bg cert-word w-full relative cursor-pointer">

                <img src="images/cert-word.jpg"
                     alt="Word Associate"

                     onclick="openModal(this.src, 'Word Associate')"

                     class="relative z-10 w-full
                            transition duration-300
                            hover:scale-[1.02]
                            shadow-[0_8px_30px_rgba(0,0,0,0.35)]">

            </div>

            <!-- TITLE -->
            <h2 class="mt-10 text-[25px] font-semibold text-center text-[#fbcabb]">
                Word Associate
            </h2>

            <p class="mt-1 tracking-[5px] text-white/50">
                MS 365 APPS
            </p>

            <!-- BUTTONS -->
            <div class="flex gap-4 mt-5 w-full">

                <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
                   target="_blank"
                   class="verify-btn verify-word">

                    VERIFY

                </a>

            </div>

            <p class="mt-3 text-[16px] text-[#fbcabb]/80">
                code: eLSa - 4wvo
            </p>

        </div>

        <!-- PPT -->
        <div class="cert-card
                w-full
                sm:w-[250px]
                lg:w-[270px]
                xl:w-[290px]
                rounded-[28px]
                bg-white/5
                backdrop-blur-xl
                p-6
                flex flex-col items-center">

            <div class="cert-img-bg cert-ppt w-full relative cursor-pointer">

                <img src="images/cert-ppt.jpg"
                     alt="PowerPoint Associate"

                     onclick="openModal(this.src, 'PowerPoint Associate')"

                     class="relative z-10 w-full
                            transition duration-300
                            hover:scale-[1.02]
                            shadow-[0_8px_30px_rgba(0,0,0,0.35)]">

            </div>

            <h2 class="mt-10 text-[22px] font-semibold text-center text-[#ec9cb4]">
                PowerPoint Associate
            </h2>

            <p class="mt-1 tracking-[5px] text-white/50">
                MS 365 APPS
            </p>

            <div class="flex gap-4 mt-5 w-full">

                <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
                   target="_blank"
                   class="verify-btn verify-ppt">

                    VERIFY

                </a>

            </div>

            <p class="mt-3 text-[16px] text-[#ec9cb4]/80">
                code: 2CCE - Xaqa
            </p>

        </div>

        <!-- JAVA -->
        <div class="cert-card
                w-full
                sm:w-[250px]
                lg:w-[270px]
                xl:w-[290px]
                rounded-[28px]
                bg-white/5
                backdrop-blur-xl
                p-6
                flex flex-col items-center">

            <div class="cert-img-bg cert-java w-full relative cursor-pointer">

                <img src="images/cert-java.jpg"
                     alt="Java Certification"

                     onclick="openModal(this.src, 'Java Certification')"

                     class="relative z-10 w-full
                            transition duration-300
                            hover:scale-[1.02]
                            shadow-[0_8px_30px_rgba(0,0,0,0.35)]">

            </div>

            <h2 class="mt-10 text-[25px] font-semibold text-center text-[#89bce5]">
                Java
            </h2>

            <p class="mt-1 tracking-[5px] text-white/50">
                IT SPECIALIST
            </p>


            <div class="flex gap-4 mt-5 w-full">
                <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" target="_blank" class="verify-btn verify-java">
                    VERIFY
                </a>

            </div>

            <p class="mt-3 text-[16px] text-[#89bce5]/80">
                code: LSE9 - s4Na
            </p>

        </div>

    </div>

</section>
