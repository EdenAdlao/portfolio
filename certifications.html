<section class="max-w-5xl mx-auto px-6 pt-14 md:pt-20 pb-24">

            sm:grid-cols-2
            xl:grid-cols-3
            gap-10

            place-items-center">

        <!-- WORD -->
        <div class="cert-card
                w-full

                lg:w-[270px]
                xl:w-[290px]

                p-6

                <img src="images/cert-word.jpg"

                     onclick="openModal(this.src)"

                     class="relative z-10 w-full
                            transition duration-300
                            hover:scale-[1.02]
                            shadow-[0_8px_30px_rgba(0,0,0,0.35)]">

            </div>

            <!-- TITLE -->
            <h2 class="mt-14 text-[25px] font-semibold text-center text-[#fbcabb]">
                Word Associate
            </h2>

            <p class="mt-1 tracking-[5px] text-white/50">
                MS 365 APPS
            </p>

            <!-- BUTTONS -->
            <div class="flex gap-4 mt-8 w-full">

                <button onclick="copyCode('eLSa-4wvo')"
                        class="copy-btn copy-word">

                    <span class="material-symbols-outlined">
                        content_copy
                    </span>

                    CODE

                </button>

                <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
                   target="_blank"
                   class="verify-btn verify-word">

                    VERIFY

                </a>

            </div>

        </div>

        <!-- PPT -->

                w-full
                sm:w-[250px]
                lg:w-[270px]
                xl:w-[290px]
                rounded-[28px]
                bg-white/5
                backdrop-blur-xl
                p-6
                flex flex-col items-center">

                <img src="images/cert-ppt.jpg"
                     alt="PowerPoint Associate"

                     onclick="openModal(this.src)"

                     class="relative z-10 w-full

                            shadow-[0_8px_30px_rgba(0,0,0,0.35)]">

            </div>

            <h2 class="mt-14 text-[22px] font-semibold text-center text-[#ec9cb4]">
                PowerPoint Associate
            </h2>

            <p class="mt-1 tracking-[5px] text-white/50">
                MS 365 APPS
            </p>

            <div class="flex gap-4 mt-8 w-full">

                <button onclick="copyCode('2CCE-Xaqa')"

                xl:w-[290px]

<!-- ========================= -->
<!-- IMAGE MODAL -->
<!-- ========================= -->

<div id="imageModal"
     onclick="closeModal()"
     class="fixed inset-0 bg-black/80
            hidden
            items-center
            justify-center
            z-[9999]
            p-6">

    <img id="modalImage"
         class="max-w-full max-h-full
                rounded-xl
                shadow-[0_0_40px_rgba(255,255,255,0.15)]">
</div>
<script>

    function copyCode(code) {

        navigator.clipboard.writeText(code);

        alert("Certification code copied: " + code);

    }

    function openModal(src) {

        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");

        modalImg.src = src;

        modal.classList.remove("hidden");
        modal.classList.add("flex");

    }

    function closeModal() {

        const modal = document.getElementById("imageModal");

        modal.classList.remove("flex");
        modal.classList.add("hidden");

    }

</script>
