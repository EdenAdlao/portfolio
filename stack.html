<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Stack | Eden Adlao</title>
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

</head>

<body id="page-stack" class="m-0 p-0 relative font-['Poppins']">
    

    <div id="navbar"
        class="fixed bottom-0 md:top-0 md:bottom-auto
        left-0 w-full z-50
        flex justify-around md:justify-center md:gap-10
        px-6 py-3 md:h-16
        bg-[#1a270b]/80 backdrop-blur-md
        border-t md:border-t-0 md:border-b border-white/10">

            <!-- HOME -->
            <a href="index.html"
            class="nav-link flex flex-col md:flex-row items-center gap-1 md:gap-2">

                <span class="material-symbols-outlined text-[26px] md:hidden">
                home
                </span>
                <span class="hidden md:inline">HOME</span>

            </a>

            <!-- ABOUT -->
            <a href="about.html"
            class="nav-link flex flex-col md:flex-row items-center gap-1 md:gap-2">

                <span class="material-symbols-outlined text-[26px] md:hidden">
                person
                </span>
                <span class="hidden md:inline">ABOUT</span>

            </a>

            <!-- STACK -->
            <a href="stack.html"
            class="nav-link active stack flex flex-col md:flex-row items-center gap-1 md:gap-2">

                <span class="material-symbols-outlined text-[26px] md:hidden">
                code
                </span>
                <span class="hidden md:inline">STACK</span>

            </a>

            <!-- CERTIFICATIONS -->
            <a href="certifications.html"
            class="nav-link flex flex-col md:flex-row items-center gap-1 md:gap-2">

                <span class="material-symbols-outlined text-[26px] md:hidden">
                verified
                </span>
                <span class="hidden md:inline">CERTIFICATIONS</span>

            </a>

    </div>

    <section class="pt-32 ">
        <h1 class="stack-title
            text-center
            text-[28px] sm:text-[35px] md:text-[50px]
            font-medium
            tracking-[2px]
            text-[#ffd236]
            drop-shadow-[0_5px_4px_rgba(0,0,0,0.5)]
            mb-10 md:mb-16">

            MY STACK
        </h1>
    </section>



    <!-- STACK GRID -->
    <div class="max-w-xl mx-auto px-6 pb-32 md:pb-10">

        <div class="grid
            grid-flow-row
            grid-cols-2
            md:grid-cols-3
            lg:grid-cols-4
            justify-center
            gap-4
            justify-items-center
            items-center
            ">
            

            <!-- HTML -->
            <div class="icon-frame">
                <img src="stack-icons/stack-html.svg"
                    class="w-auto h-auto max-h-24 md:max-h-28
                    transition-all ease-in-out  
                    hover:scale-110
                    ">
                
            </div>

            <!-- CSS -->
            <div class="icon-frame">
                <img src="stack-icons/stack-css (1).svg"
                    class="w-auto h-auto max-h-24 md:max-h-28
                    transition-all duration-300 
                    hover:scale-110">
            </div>

            <!-- JavaScript -->
            <div class="icon-frame">
                <img src="stack-icons/stack-javascript.svg"
                    class="w-auto h-auto max-h-24 md:max-h-28
                    transition-all duration-300 
                    hover:scale-110">
            </div>

            <!-- C -->
            <div class="icon-frame">
                <img src="stack-icons/stack-c.svg"
                    class="w-auto h-auto max-h-24 md:max-h-28
                    transition-all duration-300 
                    hover:scale-110">
                
            </div>

            <!-- Java -->

                    hover:scale-110">
            </div>

                    hover:scale-110">
            </div>

            <div class="icon-frame">

                    class="w-auto h-auto max-h-24 md:max-h-28

                    hover:scale-110">
            </div>

            <!-- MySQL -->
            <div class="icon-frame">
                <img src="stack-icons/stack-my-sql.svg"
                    class="w-auto h-auto max-h-24 md:max-h-28
                    transition-all duration-300 
                    hover:scale-110">
            </div>

            <!-- PostgreSQL -->
            <div class="icon-frame">
                <img src="stack-icons/stack-postgre.svg"
                    class="w-auto h-auto max-h-24 md:max-h-28

                    hover:scale-110">
            </div>

            <!-- SQLite -->
            <div class="icon-frame">

                    class="w-auto h-auto max-h-24 md:max-h-28
                    transition-all duration-300 
                    hover:scale-110">
            </div>

            <!-- Git -->
            <div class="icon-frame">

            <!-- Github -->

                    hover:scale-110">
            </div>

            <!-- VS Code -->
            <div class="icon-frame">
                <img src="stack-icons/stack-vs-code.svg"
                    class="w-auto h-auto max-h-24 md:max-h-28
                    transition-all duration-300 
                    hover:scale-110">
            </div>

            <!-- Android Studio -->
            <div class="icon-frame">
                <img src="stack-icons/stack-android-studio.svg"
                    class="w-auto h-auto max-h-24 md:max-h-28
                    transition-all duration-300 
                    hover:scale-110">
            </div>

        </div>

    </div>
